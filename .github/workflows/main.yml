name: Đẩy code tự động bằng WebDeploy Chính Chủ

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: 1. Tải code từ GitHub về
      uses: actions/checkout@v4

    - name: 2. Cài đặt .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Sửa thành 6.0.x hoặc 7.0.x nếu dự án dùng bản cũ hơn

    - name: 3. Biên dịch và Đóng gói (Publish)
      run: dotnet publish -c Release -o ./publish_output

    - name: 4. Đẩy file lên MonsterASP bằng WebDeploy (Đã bọc bảo mật)
      env:
        BIEU_DIEN_MAT_KHAU: ${{ secrets.WEBDEPLOY_PASSWORD }}
      run: |
        & "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -source:contentPath='${{ github.workspace }}\publish_output' -dest:contentPath='${{ secrets.WEBDEPLOY_SITENAME }}',computerName='${{ secrets.WEBDEPLOY_SERVER }}',userName='${{ secrets.WEBDEPLOY_USERNAME }}',password="$env:BIEU_DIEN_MAT_KHAU",authType='Basic' -verb:sync -enableRule:AppOffline
