name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches:
      - main # Chạy khi code đẩy vào nhánh main

jobs:
  build_and_deploy:
    runs-on: windows-latest

    steps:
    - name: 1. Tải code từ GitHub về
      uses: actions/checkout@v4

    - name: 2. Cài đặt .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Sửa lại nếu dự án của bạn dùng .NET 6.0 hoặc 7.0

    - name: 3. Cài đặt thư viện (Restore)
      run: dotnet restore

    - name: 4. Đóng gói ứng dụng (Publish)
      run: dotnet publish --configuration Release --output ./publish

    - name: 5. Đẩy file lên MonsterASP qua Action chuyên dụng
      uses: rasmusbuchholdt/simply-web-deploy@2.1.0
      with:
        website-name: ${{ secrets.WEBSITE_NAME }}
        server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
        server-username: ${{ secrets.SERVER_USERNAME }}
        server-password: ${{ secrets.SERVER_PASSWORD }}
