name: Đẩy code tự động bằng WebDeploy Chính Chủ

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: 1. Tải code từ GitHub về
      uses: actions/checkout@v4

    - name: 2. Cài đặt .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: 3. Biên dịch và Đóng gói (Publish)
      run: dotnet publish TTNguVan/TTNguVan.csproj -c Release -o ./publish_output

    - name: 4. Đẩy file lên MonsterASP bằng WebDeploy chính chủ
      shell: cmd
      env:
        BIEU_DIEN_MAT_KHAU: ${{ secrets.WEBDEPLOY_PASSWORD }}
      run: |
        "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -source:contentPath="${{ github.workspace }}\publish_output" -dest:contentPath="${{ secrets.WEBDEPLOY_SITENAME }}",computerName="${{ secrets.WEBDEPLOY_SERVER }}",userName="${{ secrets.WEBDEPLOY_USERNAME }}",password="%BIEU_DIEN_MAT_KHAU%",authType="Basic" -verb:sync -enableRule:AppOffline
