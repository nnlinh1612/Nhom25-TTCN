name: Deploy ASP.NET Core to MonsterASP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore TTNguVan/TTNguVan.csproj

      - name: Build
        run: dotnet build TTNguVan/TTNguVan.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish TTNguVan/TTNguVan.csproj --configuration Release --output ./publish --no-build

      - name: Create production appsettings
        shell: pwsh
        run: |
          $json = @{
            GeminiApiKey = "${{ secrets.GeminiAPIKey }}"
          } | ConvertTo-Json -Depth 10

          Set-Content -Path "./publish/appsettings.Production.json" -Value $json -Encoding UTF8

      - name: Deploy to MonsterASP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./publish/
          server-dir: /wwwroot/
